services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
  db:
    image: postgres:18.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"