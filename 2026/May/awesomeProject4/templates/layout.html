{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Task CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Task CRUD</a>
        <div class="navbar-nav ms-auto align-items-lg-center">
            {{if .LoggedIn}}
            <span class="navbar-text text-white-50 me-lg-3">Hi, {{.Username}}</span>
            <a class="nav-link" href="/">All tasks</a>
            <a class="nav-link" href="/tasks/new">New task</a>
            <form action="/logout" method="post" class="d-inline ms-lg-2">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
            {{else}}
            <a class="nav-link" href="/login">Login</a>
            <a class="nav-link" href="/register">Register</a>
            {{end}}
        </div>
    </div>
</nav>

<main class="container pb-5">
    {{template "content" .}}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
{{end}}
