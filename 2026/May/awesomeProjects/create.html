<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create product</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 420px;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 26px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #444;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #d9dee8;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: .2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,.12);
        }

        input[type="submit"] {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }

        input[type="submit"]:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Add product</h1>

    <form method="post">
        <label>Model</label>
        <input type="text" name="model"/>

        <label>Company</label>
        <input type="text" name="company"/>

        <label>Price</label>
        <input type="number" name="price"/>

        <input type="submit" value="Save">
    </form>
</div>
</body>
</html>
