<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Car</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        color: #1f2937;
    }

    .form-card {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
        margin: 0 0 18px;
        font-size: 26px;
    }

    .record-id {
        margin: 0 0 18px;
        font-size: 14px;
        color: #6b7280;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px 12px;
    }

    .field {
        margin-bottom: 14px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 600;
    }

    input[type="text"],
    input[type="number"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    input[type="submit"] {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        background: #2563eb;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
    }

    input[type="submit"]:hover {
        background: #1d4ed8;
    }
</style>
<body>
    <div class="form-card">
        <h1>Edit Car</h1>
        <form method="post">
            <p class="record-id">ID: {{.Id}}</p>

            <div class="field">
                <label for="model">Model</label>
                <input id="model" type="text" name="model" value="{{.Model}}" required />
            </div>

            <div class="field">
                <label for="company">Company</label>
                <input id="company" type="text" name="company" value="{{.Company}}" required />
            </div>

            <div class="field">
                <label for="price">Price</label>
                <input id="price" type="number" name="price" value="{{.Price}}" required />
            </div>

            <input type="submit" value="Save Changes" />
        </form>
    </div>
</body>
</html>
